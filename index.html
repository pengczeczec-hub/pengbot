<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymonitor Pro - Auto System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .tab-active { background: #8b5cf6 !important; color: white !important; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <header class="glass border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                <h1 class="text-lg font-bold">Polymonitor <span class="text-fuchsia-400">Pro</span></h1>
                <span class="text-xs text-gray-500 ml-2" id="last-scan">載入中...</span>
            </div>
            <button onclick="loadFromPolymarket()" class="px-3 py-1 bg-violet-600 hover:bg-violet-500 rounded text-sm">🔄 刷新市場</button>
        </div>
    </header>

    <div class="container mx-auto px-4 py-4">
        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">市場總數</div>
                <div class="text-xl font-bold text-white" id="market-count">0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">高信心機會</div>
                <div class="text-xl font-bold text-green-400" id="high-conf">0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">總下注</div>
                <div class="text-xl font-bold text-purple-400" id="totalBets">0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">正確率</div>
                <div class="text-xl font-bold text-yellow-400" id="accuracy">0%</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto">
            <button onclick="switchTab('recommend')" id="tab-recommend" class="tab-btn tab-active px-4 py-2 rounded-lg text-sm font-medium transition">📈 推薦</button>
            <button onclick="switchTab('watching')" id="tab-watching" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">👁️ 追蹤</button>
            <button onclick="switchTab('history')" id="tab-history" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">📋 歷史</button>
            <button onclick="switchTab('profit')" id="tab-profit" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">💰 損益</button>
        </div>

        <!-- Content Panels -->
        <div class="glass rounded-xl p-4">
            <!-- Recommend Tab -->
            <div id="panel-recommend" class="tab-panel">
                <h3 class="text-sm font-medium text-gray-400 mb-3">🎯 AI 精選推薦</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">類別</th>
                                <th class="text-left py-2 px-2">市場</th>
                                <th class="text-center py-2 px-2">預測</th>
                                <th class="text-center py-2 px-2">信心度</th>
                                <th class="text-left py-2 px-2">理由</th>
                            </tr>
                        </thead>
                        <tbody id="recommend-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- Watching Tab -->
            <div id="panel-watching" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">👁️ 關注市場</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">類別</th>
                                <th class="text-left py-2 px-2">市場</th>
                                <th class="text-center py-2 px-2">Yes %</th>
                                <th class="text-right py-2 px-2">成交量</th>
                            </tr>
                        </thead>
                        <tbody id="watching-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- History Tab -->
            <div id="panel-history" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">📋 下注歷史</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">日期</th>
                                <th class="text-left py-2 px-2">市場</th>
                                <th class="text-center py-2 px-2">選擇</th>
                                <th class="text-right py-2 px-2">金額</th>
                                <th class="text-center py-2 px-2">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="history-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- Profit Tab -->
            <div id="panel-profit" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">💰 損益紀錄</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">市場</th>
                                <th class="text-right py-2 px-2">結果</th>
                            </tr>
                        </thead>
                        <tbody id="profit-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 text-center text-gray-500 text-xs">
            數據來源：由 AI Agent 自動分析 Polymarket 市場 | 最後更新：<span id="last-update">--</span>
        </div>
    </div>

    <script>
        // 類別映射
        const CATEGORY_MAP = {
            'crypto': '💎 Crypto',
            'politics': '🏛️ Politics',
            'sports': '⚽ Sports',
            'geopolitics': '🌍 Geopolitics',
            'entertainment': '🎬 Entertainment',
            'economics': '💵 Economics'
        };

        function categorize(question) {
            if (!question) return '❓ Other';
            const s = question.toLowerCase();
            if (/bitcoin|crypto|eth|btc|satoshi/.test(s)) return '💎 Crypto';
            if (/trump|biden|obama|election|congress|senate|vote|hegseth/.test(s)) return '🏛️ Politics';
            if (/nba|nfl|nhl|world cup|champion|tennis|soccer|football|fifa|roland garros|atlanta|braves/.test(s)) return '⚽ Sports';
            if (/fed|rate|inflation|gdp/.test(s)) return '💵 Economics';
            if (/russia|ukraine|china|iran|war|peace/.test(s)) return '🌍 Geopolitics';
            if (/gta|album|movie|oscar|film/.test(s)) return '🎬 Entertainment';
            return '❓ Other';
        }

        // 儲存資料
        let markets = [];
        let bets = [];

        // 從 Polymarket API 獲取數據
        async function loadFromPolymarket() {
            try {
                document.getElementById('last-scan').textContent = '載入中...';
                
                // 使用 Polymarket API
                const response = await fetch('https://clob.polymarket.com/markets', {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('API failed');
                
                const data = await response.json();
                markets = (data.markets || data || []).slice(0, 100).map(m => ({
                    category: categorize(m.question),
                    question: m.question,
                    yes: parseFloat(m.current_price) || parseFloat(m.priceYes) || 0.5,
                    no: parseFloat(m.current_price_no) || parseFloat(m.priceNo) || 0.5,
                    volume: parseInt(m.volume) || 0,
                    liquidity: parseInt(m.liquidity) || 0
                }));
                
                updateDisplay();
                document.getElementById('last-scan').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('last-update').textContent = new Date().toLocaleString('zh-TW');
            } catch(e) {
                console.error('Load error:', e);
                // 加載演示數據
                loadDemoData();
            }
        }

        function loadDemoData() {
            // 演示數據
            markets = [
                {category: '⚽ Sports', question: 'Will France win the 2026 FIFA World Cup?', yes: 0.15, volume: 2500000},
                {category: '⚽ Sports', question: 'Will Spain win the 2026 FIFA World Cup?', yes: 0.18, volume: 2100000},
                {category: '⚽ Sports', question: 'Will Brazil win the 2026 FIFA World Cup?', yes: 0.12, volume: 3200000},
                {category: '⚽ Sports', question: 'Will Germany win the 2026 FIFA World Cup?', yes: 0.10, volume: 1800000},
                {category: '⚽ Sports', question: 'Will England win the 2026 FIFA World Cup?', yes: 0.14, volume: 1900000},
                {category: '🏛️ Politics', question: 'Will Trump win the 2028 US Presidential Election?', yes: 0.45, volume: 850000},
                {category: '🏛️ Politics', question: 'Will Barack Obama win the 2028 Democratic presidential nomination?', yes: 0.08, volume: 320000},
                {category: '💎 Crypto', question: 'Will Bitcoin reach $150k by Dec 2026?', yes: 0.35, volume: 540000},
                {category: '💎 Crypto', question: 'Will Satoshi\'s identity be revealed by December 31?', yes: 0.05, volume: 210000},
                {category: '⚽ Sports', question: 'Roland Garros ATP: Jaime Faria vs Frances Tiafoe', yes: 0.72, volume: 45000},
                {category: '⚽ Sports', question: 'Atlanta Braves vs. Cincinnati Reds', yes: 0.58, volume: 32000},
            ];
            
            bets = [
                {date: '2026-05-29', market: 'Will France win the 2026 FIFA World Cup?', choice: 'NO', amount: 200, odds: '1.20', result: 'pending'},
                {date: '2026-05-29', market: 'Will Spain win the 2026 FIFA World Cup?', choice: 'NO', amount: 200, odds: '1.20', result: 'pending'},
                {date: '2026-05-28', market: 'Will Arsenal win the 2025-26 Champions League?', choice: 'NO', amount: 150, odds: '1.15', result: 'won'},
                {date: '2026-05-28', market: 'Will Paris Saint-Germain FC win on 2026-05-30?', choice: 'NO', amount: 150, odds: '1.25', result: 'won'},
            ];
            
            updateDisplay();
            document.getElementById('last-scan').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-TW');
        }

        function updateDisplay() {
            // 統計
            const totalVolume = markets.reduce((sum, m) => sum + (m.volume || 0), 0);
            document.getElementById('market-count').textContent = markets.length;
            
            const highConf = markets.filter(m => Math.abs(m.yes - 0.5) > 0.35).length;
            document.getElementById('high-conf').textContent = highConf;
            
            const totalBet = bets.reduce((sum, b) => sum + (b.amount || 0), 0);
            document.getElementById('totalBets').textContent = '$' + totalBet.toLocaleString();
            
            const settled = bets.filter(b => b.result !== 'pending');
            const correct = settled.filter(b => b.result === 'won').length;
            const acc = settled.length > 0 ? Math.round(correct / settled.length * 100) : 0;
            document.getElementById('accuracy').textContent = acc + '%';
            
            renderRecommend();
            renderWatching();
            renderHistory();
            renderProfit();
        }

        function renderRecommend() {
            const tbody = document.getElementById('recommend-table');
            tbody.innerHTML = '';
            
            // 高信心機會
            const recs = markets
                .filter(m => Math.abs(m.yes - 0.5) > 0.35)
                .sort((a, b) => Math.abs(b.yes - 0.5) - Math.abs(a.yes - 0.5))
                .slice(0, 10);
            
            if (recs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-gray-500 py-4 text-center">暫無推薦</td></tr>';
                return;
            }
            
            recs.forEach(m => {
                const predict = m.yes > 0.5 ? 'YES' : 'NO';
                const conf = Math.round(Math.abs(m.yes - 0.5) * 200);
                const reason = m.yes > 0.5 
                    ? '市場偏向 Yes，具吸引力赔率' 
                    : '市場偏向 No，较高胜率';
                
                const row = `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-2 px-2">${m.category}</td>
                    <td class="py-2 px-2 text-left max-w-xs truncate">${m.question}</td>
                    <td class="text-center py-2 px-2"><span class="${predict === 'YES' ? 'text-green-400' : 'text-red-400'} font-bold">${predict}</span></td>
                    <td class="text-center py-2 px-2"><span class="text-${conf > 70 ? 'green' : 'yellow'}-400">${conf}%</span></td>
                    <td class="py-2 px-2 text-gray-400 text-xs">${reason}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function renderWatching() {
            const tbody = document.getElementById('watching-table');
            tbody.innerHTML = '';
            
            const sorted = [...markets].sort((a, b) => (b.volume || 0) - (a.volume || 0)).slice(0, 20);
            
            sorted.forEach(m => {
                const row = `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-2 px-2">${m.category}</td>
                    <td class="py-2 px-2 text-left max-w-xs truncate">${m.question}</td>
                    <td class="text-center py-2 px-2"><span class="text-${m.yes > 0.5 ? 'green' : 'red'}-400">${Math.round(m.yes * 100)}%</span></td>
                    <td class="text-right py-2 px-2 text-gray-400">$${(m.volume / 1000).toFixed(0)}k</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function renderHistory() {
            const tbody = document.getElementById('history-table');
            tbody.innerHTML = '';
            
            const sorted = [...bets].reverse();
            
            if (sorted.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-gray-500 py-4 text-center">暫無下注記錄</td></tr>';
                return;
            }
            
            sorted.forEach(b => {
                const statusClass = b.result === 'pending' 
                    ? 'bg-yellow-500/20 text-yellow-400' 
                    : (b.result === 'won' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400');
                const statusLabel = b.result === 'pending' ? '待結算' : (b.result === 'won' ? '✅ 正確' : '❌ 錯誤');
                
                const row = `<tr class="border-b border-gray-800">
                    <td class="py-2 px-2 text-gray-400">${b.date}</td>
                    <td class="py-2 px-2 text-left max-w-xs truncate">${b.market}</td>
                    <td class="text-center py-2 px-2"><span class="${b.choice === 'YES' ? 'text-green-400' : 'text-red-400'} font-bold">${b.choice}</span></td>
                    <td class="text-right py-2 px-2">$${b.amount} @ ${b.odds}</td>
                    <td class="text-center py-2 px-2"><span class="px-2 py-1 rounded text-xs ${statusClass}">${statusLabel}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function renderProfit() {
            const tbody = document.getElementById('profit-table');
            tbody.innerHTML = '';
            
            const settled = bets.filter(b => b.result !== 'pending');
            let totalProfit = 0;
            
            settled.forEach(b => {
                const profit = b.result === 'won' 
                    ? b.amount * (parseFloat(b.odds) - 1) 
                    : -b.amount;
                totalProfit += profit;
                
                const row = `<tr class="border-b border-gray-800">
                    <td class="py-2 px-2 text-left">${b.market}</td>
                    <td class="text-right py-2 px-2 text-${profit >= 0 ? 'green' : 'red'}-400">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
            
            if (settled.length > 0) {
                tbody.innerHTML += `<tr class="border-t border-gray-700">
                    <td class="py-2 px-2 font-bold">總計</td>
                    <td class="text-right py-2 px-2 font-bold text-${totalProfit >= 0 ? 'green' : 'red'}-400">${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}</td>
                </tr>`;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('bg-gray-800', 'text-gray-400');
            });
            
            document.getElementById('panel-' + tab).classList.remove('hidden');
            const btn = document.getElementById('tab-' + tab);
            btn.classList.add('tab-active');
            btn.classList.remove('bg-gray-800', 'text-gray-400');
        }

        // 初始化
        loadDemoData();
    </script>
</body>
</html>
