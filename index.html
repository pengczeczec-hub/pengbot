<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymonitor Pro - Polymarket 即時儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .tab-active { background: #8b5cf6 !important; color: white !important; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <header class="glass border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                <h1 class="text-lg font-bold">Polymonitor <span class="text-fuchsia-400">Pro</span></h1>
                <span class="text-xs text-gray-500 ml-2" id="last-scan">--:--</span>
            </div>
            <button onclick="loadMarkets()" class="px-3 py-1 bg-violet-600 hover:bg-violet-500 rounded text-sm">🔄 刷新</button>
        </div>
    </header>

    <div class="container mx-auto px-4 py-4">
        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">市場總數</div>
                <div class="text-xl font-bold text-white" id="market-count">0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">高信心機會</div>
                <div class="text-xl font-bold text-green-400" id="high-conf">0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">總成交量</div>
                <div class="text-xl font-bold text-purple-400" id="volume">$0</div>
            </div>
            <div class="glass rounded-xl p-3">
                <div class="text-gray-400 text-xs">體育市場</div>
                <div class="text-xl font-bold text-yellow-400" id="sports-count">0</div>
            </div>
        </div>

        <!-- Search -->
        <div class="glass rounded-xl p-3 mb-4">
            <input type="text" id="search-input" placeholder="搜尋市場..." 
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-violet-500"
                oninput="filterMarkets()">
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto">
            <button onclick="switchTab('recommend')" id="tab-recommend" class="tab-btn tab-active px-4 py-2 rounded-lg text-sm font-medium transition">🎯 推薦</button>
            <button onclick="switchTab('sports')" id="tab-sports" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">⚽ 體育</button>
            <button onclick="switchTab('politics')" id="tab-politics" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">🏛️ 政治</button>
            <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">💎 加密幣</button>
            <button onclick="switchTab('all')" id="tab-all" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 text-gray-400 transition">📊 所有</button>
        </div>

        <!-- Content Panels -->
        <div class="glass rounded-xl p-4">
            <div id="panel-recommend" class="tab-panel">
                <h3 class="text-sm font-medium text-gray-400 mb-3">🎯 高信心推薦</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">類別</th>
                                <th class="text-left py-2 px-2">市場問題</th>
                                <th class="text-center py-2 px-2">Yes</th>
                                <th class="text-right py-2 px-2">成交量</th>
                                <th class="text-center py-2 px-2">預測</th>
                            </tr>
                        </thead>
                        <tbody id="recommend-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="panel-sports" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">⚽ 體育市場</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">市場問題</th>
                                <th class="text-center py-2 px-2">Yes %</th>
                                <th class="text-right py-2 px-2">成交量</th>
                                <th class="text-center py-2 px-2">行動</th>
                            </tr>
                        </thead>
                        <tbody id="sports-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="panel-politics" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">🏛️ 政治市場</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">市場問題</th>
                                <th class="text-center py-2 px-2">Yes %</th>
                                <th class="text-right py-2 px-2">成交量</th>
                            </tr>
                        </thead>
                        <tbody id="politics-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="panel-crypto" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">💎 加密幣市場</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">市場問題</th>
                                <th class="text-center py-2 px-2">Yes %</th>
                                <th class="text-right py-2 px-2">成交量</th>
                            </tr>
                        </thead>
                        <tbody id="crypto-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="panel-all" class="tab-panel hidden">
                <h3 class="text-sm font-medium text-gray-400 mb-3">📊 所有市場</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-500 border-b border-gray-700">
                                <th class="text-left py-2 px-2">類別</th>
                                <th class="text-left py-2 px-2">市場問題</th>
                                <th class="text-center py-2 px-2">Yes %</th>
                                <th class="text-right py-2 px-2">成交量</th>
                            </tr>
                        </thead>
                        <tbody id="all-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 text-center text-gray-500 text-xs">
            數據來源：Polymarket API | 最後更新：<span id="last-update">--</span>
        </div>
    </div>

    <script>
        // Polymarket API
        const POLYMARKET_API = 'https://clob.polymarket.com';
        
        let allMarkets = [];
        let filteredMarkets = [];

        function categorize(question) {
            if (!question) return '❓ Other';
            const s = question.toLowerCase();
            if (/bitcoin|crypto|eth|btc|satoshi|bitcoin/.test(s)) return '💎 加密幣';
            if (/trump|biden|obama|election|congress|senate|vote|hegseth|president/.test(s)) return '🏛️ 政治';
            if (/nba|nfl|nhl|world cup|champion|tennis|soccer|football|fifa|roland garros|atlanta|braves|arsenal|psg|paris/.test(s)) return '⚽ 體育';
            if (/fed|rate|inflation|gdp/.test(s)) return '💵 經濟';
            return '❓ 其他';
        }

        async function loadMarkets() {
            const statusEl = document.getElementById('last-scan');
            statusEl.textContent = '載入中...';
            
            try {
                // 嘗試從 Polymarket API 獲取市場
                const response = await fetch(POLYMARKET_API + '/markets', {
                    headers: { 
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    processMarketData(data);
                } else {
                    throw new Error('API response failed');
                }
            } catch(e) {
                console.error('Polymarket API error:', e);
                // 使用備用方法獲取數據
                await loadMarketsBackup();
            }
        }

        async function loadMarketsBackup() {
            // 嘗試 GraphQL endpoint
            try {
                const query = `
                    query GetMarkets {
                        markets(first: 50, orderBy: volume24hrDesc) {
                            question
                            clobTokenId
                                    currentPrice
                            volume24hr
                            volume
                        }
                    }
                `;
                
                const response = await fetch('https://clob.polymarket.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.data && result.data.markets) {
                        const markets = result.data.markets.map(m => ({
                            question: m.question,
                            yes: parseFloat(m.currentPrice) || 0.5,
                            volume: parseInt(m.volume) || 0
                        }));
                        displayMarkets(markets);
                        return;
                    }
                }
            } catch(e) {
                console.error('Backup error:', e);
            }
            
            // 最後使用示例數據
            loadDemoData();
        }

        function processMarketData(data) {
            let markets = [];
            
            if (Array.isArray(data)) {
                markets = data.slice(0, 100).map(m => ({
                    question: m.question || m.description,
                    yes: parseFloat(m.current_price || m.priceYes || 0.5),
                    no: parseFloat(m.current_price_no || m.priceNo || 0.5),
                    volume: parseInt(m.volume || 0),
                    tokenId: m.clobTokenId || m.conditionId
                }));
            } else if (data.markets) {
                markets = data.markets.slice(0, 100).map(m => ({
                    question: m.question || m.description,
                    yes: parseFloat(m.current_price || m.priceYes || 0.5),
                    no: parseFloat(m.current_price_no || m.priceNo || 0.5),
                    volume: parseInt(m.volume || 0),
                    tokenId: m.clobTokenId || m.conditionId
                }));
            }
            
            displayMarkets(markets);
        }

        function displayMarkets(markets) {
            allMarkets = markets.map(m => ({
                ...m,
                category: categorize(m.question)
            }));
            
            filteredMarkets = [...allMarkets];
            
            updateStats();
            renderAllTables();
            
            const now = new Date();
            document.getElementById('last-scan').textContent = 
                now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('last-update').textContent = 
                now.toLocaleString('zh-TW');
        }

        function loadDemoData() {
            const demo = [
                {question: 'Will France win the 2026 FIFA World Cup?', yes: 0.12, volume: 2500000, category: '⚽ 體育'},
                {question: 'Will Spain win the 2026 FIFA World Cup?', yes: 0.18, volume: 2100000, category: '⚽ 體育'},
                {question: 'Will Brazil win the 2026 FIFA World Cup?', yes: 0.14, volume: 3200000, category: '⚽ 體育'},
                {question: 'Will Germany win the 2026 FIFA World Cup?', yes: 0.09, volume: 1800000, category: '⚽ 體育'},
                {question: 'Will England win the 2026 FIFA World Cup?', yes: 0.15, volume: 1900000, category: '⚽ 體育'},
                {question: 'Will Trump win the 2028 US Presidential Election?', yes: 0.42, volume: 1250000, category: '🏛️ 政治'},
                {question: 'Will Barack Obama win the 2028 Democratic nomination?', yes: 0.08, volume: 320000, category: '🏛️ 政治'},
                {question: 'Will Pete Hegseth win the 2028 US Presidential Election?', yes: 0.03, volume: 180000, category: '🏛️ 政治'},
                {question: 'Will Bitcoin reach $150k by Dec 2026?', yes: 0.28, volume: 540000, category: '💎 加密幣'},
                {question: "Will Satoshi's identity be revealed by December 31?", yes: 0.05, volume: 210000, category: '💎 加密幣'},
                {question: 'Will Ethereum surpass Bitcoin by EOY 2026?', yes: 0.22, volume: 380000, category: '💎 加密幣'},
                {question: 'Will Arsenal win the 2025-26 Champions League?', yes: 0.11, volume: 450000, category: '⚽ 體育'},
                {question: 'Will Paris Saint-Germain win in 2026?', yes: 0.08, volume: 280000, category: '⚽ 體育'},
            ];
            
            displayMarkets(demo);
        }

        function updateStats() {
            document.getElementById('market-count').textContent = allMarkets.length;
            
            const highConf = allMarkets.filter(m => Math.abs(m.yes - 0.5) > 0.3).length;
            document.getElementById('high-conf').textContent = highConf;
            
            const totalVol = allMarkets.reduce((sum, m) => sum + m.volume, 0);
            document.getElementById('volume').textContent = '$' + (totalVol >= 1000000 ? (totalVol/1000000).toFixed(1) + 'M' : (totalVol/1000).toFixed(0) + 'k');
            
            const sports = allMarkets.filter(m => m.category === '⚽ 體育').length;
            document.getElementById('sports-count').textContent = sports;
        }

        function renderAllTables() {
            renderRecommendTable();
            renderCategoryTable('sports', 'sports-table');
            renderCategoryTable('politics', 'politics-table');
            renderCategoryTable('crypto', 'crypto-table');
            renderAllTable();
        }

        function renderRecommendTable() {
            const tbody = document.getElementById('recommend-table');
            tbody.innerHTML = '';
            
            const recs = [...allMarkets]
                .filter(m => Math.abs(m.yes - 0.5) > 0.25)
                .sort((a, b) => Math.abs(b.yes - 0.5) - Math.abs(a.yes - 0.5))
                .slice(0, 15);
            
            if (recs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-gray-500 py-4 text-center">暫無推薦</td></tr>';
                return;
            }
            
            recs.forEach(m => {
                const prediction = m.yes > 0.5 ? 'NO' : 'YES';
                const predClass = prediction === 'YES' ? 'text-green-400' : 'text-red-400';
                const yesPercent = Math.round(m.yes * 100);
                const volStr = m.volume >= 1000000 ? (m.volume/1000000).toFixed(1) + 'M' : (m.volume/1000).toFixed(0) + 'k';
                
                tbody.innerHTML += `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-2 px-2 text-xs">${m.category}</td>
                    <td class="py-2 px-2 text-left max-w-xs truncate">${m.question}</td>
                    <td class="text-center py-2 px-2"><span class="${yesPercent > 50 ? 'text-green-400' : 'text-red-400'}">${yesPercent}%</span></td>
                    <td class="text-right py-2 px-2 text-gray-400">$${volStr}</td>
                    <td class="text-center py-2 px-2"><span class="${predClass} font-bold">${prediction}</span></td>
                </tr>`;
            });
        }

        function renderCategoryTable(category, tableId) {
            const tbody = document.getElementById(tableId);
            tbody.innerHTML = '';
            
            const cats = [...allMarkets].filter(m => m.category.includes(category.replace('-', '')));
            
            if (cats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-gray-500 py-4 text-center">暫無市場</td></tr>';
                return;
            }
            
            cats.forEach(m => {
                const yesPercent = Math.round(m.yes * 100);
                const volStr = m.volume >= 1000000 ? (m.volume/1000000).toFixed(1) + 'M' : (m.volume/1000).toFixed(0) + 'k';
                
                tbody.innerHTML += `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-2 px-2 text-left max-w-md">${m.question}</td>
                    <td class="text-center py-2 px-2"><span class="${yesPercent > 50 ? 'text-green-400' : 'text-red-400'} font-bold">${yesPercent}%</span></td>
                    <td class="text-right py-2 px-2 text-gray-400">$${volStr}</td>
                    <td class="text-center py-2 px-2"><a href="https://polymarket.com/market?=${m.tokenId || ''}" target="_blank" class="text-violet-400 hover:text-violet-300 text-xs">交易→</a></td>
                </tr>`;
            });
        }

        function renderAllTable() {
            const tbody = document.getElementById('all-table');
            tbody.innerHTML = '';
            
            const sorted = [...allMarkets].sort((a, b) => b.volume - a.volume).slice(0, 30);
            
            sorted.forEach(m => {
                const yesPercent = Math.round(m.yes * 100);
                const volStr = m.volume >= 1000000 ? (m.volume/1000000).toFixed(1) + 'M' : (m.volume/1000).toFixed(0) + 'k';
                
                tbody.innerHTML += `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="py-2 px-2 text-xs">${m.category}</td>
                    <td class="py-2 px-2 text-left max-w-md">${m.question}</td>
                    <td class="text-center py-2 px-2"><span class="${yesPercent > 50 ? 'text-green-400' : 'text-red-400'} font-bold">${yesPercent}%</span></td>
                    <td class="text-right py-2 px-2 text-gray-400">$${volStr}</td>
                </tr>`;
            });
        }

        function filterMarkets() {
            const query = document.getElementById('search-input').value.toLowerCase();
            
            if (!query) {
                filteredMarkets = [...allMarkets];
            } else {
                filteredMarkets = allMarkets.filter(m => 
                    m.question.toLowerCase().includes(query)
                );
            }
            
            renderAllTables();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('bg-gray-800', 'text-gray-400');
            });
            
            document.getElementById('panel-' + tab).classList.remove('hidden');
            const btn = document.getElementById('tab-' + tab);
            btn.classList.add('tab-active');
            btn.classList.remove('bg-gray-800', 'text-gray-400');
        }

        // 初始化
        loadMarkets();
    </script>
</body>
</html>
